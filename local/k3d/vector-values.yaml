role: "Stateless-Aggregator"

env:
  - name: CLICKHOUSE_PASSWORD
    valueFrom:
      secretKeyRef:
        name: clickhouse-creds
        key: password

customConfig:
  data_dir: /vector-data-dir
  api:
    enabled: true
    address: 0.0.0.0:8686
  sources:
    syslog_in:
      type: socket
      mode: udp
      address: 0.0.0.0:514
      max_length: 102400
  transforms:
    parse_pan:
      type: remap
      inputs:
        - syslog_in
      source: |
        raw = string!(.message)
        parts = split(raw, ",")
        .src_ip = parts[7]
        .dst_ip = parts[8]
        .rule = parts[11]
        .app = parts[14]
        .src_port = to_int(parts[24]) ?? 0
        .dst_port = to_int(parts[25]) ?? 0
        .protocol = parts[29]
        .action = parts[30]
        .bytes = to_int(parts[31]) ?? 0
        .src_country = parts[43]
        .log_type = parts[3]
        .event_time = format_timestamp!(now(), "%Y-%m-%d %H:%M:%S%.3f")
        if .log_type != "TRAFFIC" {
          abort
        }
        del(.message)
        del(.host)
        del(.port)
        del(.source_type)
        del(.timestamp)
  sinks:
    clickhouse_out:
      type: clickhouse
      inputs:
        - parse_pan
      endpoint: "http://clickhouse-sentinel.data.svc.cluster.local:8123"
      database: "sentinel"
      table: "firewall_events"
      auth:
        strategy: basic
        user: "admin"
        password: "${CLICKHOUSE_PASSWORD}"
      skip_unknown_fields: true
    redpanda_parsed:
      type: kafka
      inputs:
        - parse_pan
      bootstrap_servers: "redpanda.redpanda.svc.cluster.local:9093"
      topic: "firewall.parsed"
      encoding:
        codec: "json"
    redpanda_raw:
      type: kafka
      inputs:
        - syslog_in
      bootstrap_servers: "redpanda.redpanda.svc.cluster.local:9093"
      topic: "firewall.raw"
      encoding:
        codec: "text"
