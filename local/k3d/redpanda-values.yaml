statefulset:
  startupProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 6
    failureThreshold: 60
  livenessProbe:
    timeoutSeconds: 6
  readinessProbe:
    timeoutSeconds: 6
  replicas: 1
  podTemplate:
    spec:
      nodeSelector:
        workload: data
      tolerations:
        - key: workload
          value: data
          effect: NoSchedule

resources:
  cpu:
    cores: 1
  memory:
    container:
      max: 2Gi

storage:
  persistentVolume:
    enabled: true
    size: 5Gi
    storageClass: local-path

tls:
  enabled: false

external:
  enabled: false
