apiVersion: apps/v1
kind: Deployment
metadata:
  name: risk-engine
  namespace: sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: risk-engine
  template:
    metadata:
      labels:
        app: risk-engine
    spec:
      containers:
        - name: risk-engine
          image: ghcr.io/yamenmehdizade/risk-engine:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: CLICKHOUSE_HOST
              value: "clickhouse-sentinel.data.svc.cluster.local"
            - name: CLICKHOUSE_PORT
              value: "9000"
            - name: CLICKHOUSE_USER
              value: "admin"
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-creds
                  key: password
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: risk-engine
  namespace: sentinel
spec:
  selector:
    app: risk-engine
  ports:
    - port: 8000
      targetPort: 8000
