apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: risk-engine
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yamenmehdizade/sentinel-platform.git
    targetRevision: main
    path: risk-engine
  destination:
    server: https://kubernetes.default.svc
    namespace: sentinel
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
